<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aynur'a...</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --blue: #4a90d9;
  --blue-dim: #2563a8;
  --blue-glow: rgba(74, 144, 217, 0.35);
  --bg: #03060f;
  --surface: rgba(255,255,255,0.03);
  --text: #e8eef8;
  --muted: rgba(232,238,248,0.45);
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
}

/* ── NOISE OVERLAY ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.04;
  pointer-events: none;
  z-index: 999;
}

/* ── DEEP SPACE BG ── */
.scene {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 40%, #0c1f4a 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 85% 70%, #0a1730 0%, transparent 55%),
    radial-gradient(ellipse 100% 80% at 50% 100%, #050d1e 0%, transparent 70%),
    var(--bg);
}

/* ── STAR FIELD ── */
.stars {
  position: fixed;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
}

.star {
  position: absolute;
  border-radius: 50%;
  background: white;
  animation: twinkle var(--d, 4s) ease-in-out infinite var(--delay, 0s);
}

@keyframes twinkle {
  0%, 100% { opacity: var(--min-op, 0.2); transform: scale(1); }
  50% { opacity: var(--max-op, 0.9); transform: scale(1.3); }
}

/* ── AURORA LINES ── */
.aurora {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}

.aurora-band {
  position: absolute;
  left: -20%;
  width: 140%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--blue-dim), var(--blue), transparent);
  opacity: 0;
  animation: aurora-drift var(--dur, 12s) ease-in-out infinite var(--delay, 0s);
  transform-origin: center;
  filter: blur(0.5px);
}

@keyframes aurora-drift {
  0%   { opacity: 0; top: var(--start, 30%); transform: rotate(-1deg) scaleX(0.8); }
  20%  { opacity: 0.25; }
  50%  { opacity: 0.12; top: calc(var(--start, 30%) - 5%); transform: rotate(0.5deg) scaleX(1.1); }
  80%  { opacity: 0.2; }
  100% { opacity: 0; top: calc(var(--start, 30%) - 10%); transform: rotate(-0.5deg) scaleX(0.9); }
}

/* ── NEBULA PARTICLES ── */
.nebula-particle {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  animation: nebula-float var(--dur, 20s) ease-in-out infinite var(--delay, 0s);
  filter: blur(40px);
  opacity: 0;
}

@keyframes nebula-float {
  0%   { opacity: 0; transform: translate(0, 0) scale(1); }
  30%  { opacity: var(--op, 0.08); }
  70%  { opacity: var(--op, 0.05); }
  100% { opacity: 0; transform: translate(var(--tx, 20px), var(--ty, -30px)) scale(1.2); }
}

/* ── START SCREEN ── */
.start-screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 32px;
  z-index: 50;
  transition: opacity 1s ease, visibility 1s ease;
}

.start-screen.hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

.start-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(28px, 6vw, 52px);
  font-weight: 300;
  letter-spacing: 0.08em;
  color: var(--text);
  opacity: 0.8;
  text-align: center;
  line-height: 1.3;
}

.start-title em {
  font-style: italic;
  color: var(--blue);
  opacity: 1;
}

.start-line {
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--blue), transparent);
  margin: 0 auto;
  animation: line-pulse 2s ease-in-out infinite;
}

@keyframes line-pulse {
  0%, 100% { width: 40px; opacity: 0.5; }
  50% { width: 80px; opacity: 1; }
}

.start-btn {
  position: relative;
  padding: 14px 44px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 300;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text);
  background: transparent;
  border: 1px solid rgba(74,144,217,0.4);
  border-radius: 2px;
  cursor: pointer;
  overflow: hidden;
  transition: all 0.4s ease;
}

.start-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(74,144,217,0.08), rgba(74,144,217,0.02));
  transition: opacity 0.4s ease;
}

.start-btn::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0;
  width: 0; height: 1px;
  background: var(--blue);
  transition: width 0.4s ease;
}

.start-btn:hover {
  border-color: var(--blue);
  box-shadow: 0 0 30px var(--blue-glow), inset 0 0 30px rgba(74,144,217,0.05);
  letter-spacing: 0.28em;
}

.start-btn:hover::after { width: 100%; }

/* ── MAIN CONTENT ── */
.container {
  position: fixed;
  inset: 0;
  pointer-events: none;
}

/* ── TYPEWRITER SECTION ── */
.content {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90%;
  max-width: 680px;
  opacity: 0;
  transition: opacity 1.2s ease;
  text-align: center;
}

.content.visible { opacity: 1; }

.prefix-wrap {
  margin-bottom: 20px;
}

.prefix {
  display: inline-block;
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(14px, 3vw, 18px);
  font-weight: 300;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--blue);
  position: relative;
  padding: 0 20px;
}

.prefix::before,
.prefix::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 30px;
  height: 1px;
  background: var(--blue);
  opacity: 0.5;
}

.prefix::before { right: 100%; margin-right: -18px; }
.prefix::after  { left: 100%; margin-left: -18px; }

.main-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(26px, 5vw, 42px);
  font-weight: 300;
  font-style: italic;
  line-height: 1.5;
  color: var(--text);
  min-height: 70px;
  letter-spacing: 0.01em;
}

.cursor {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: var(--blue);
  vertical-align: middle;
  margin-left: 2px;
  animation: blink 1.1s ease-in-out infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* ── SENTENCE COUNTER ── */
.counter {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-top: 40px;
}

.dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: rgba(74,144,217,0.3);
  transition: all 0.4s ease;
}

.dot.active {
  background: var(--blue);
  box-shadow: 0 0 8px var(--blue-glow);
  transform: scale(1.4);
}

/* ── FINAL TEXT ── */
.final-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90%;
  max-width: 560px;
  opacity: 0;
  transition: opacity 1.5s ease;
  text-align: center;
}

.final-text.visible { opacity: 1; }

.final-line {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(16px, 2.8vw, 22px);
  font-weight: 300;
  color: var(--text);
  line-height: 1.8;
  margin-bottom: 6px;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}

.final-line.show {
  opacity: 1;
  transform: translateY(0);
}

.final-line.last {
  font-style: italic;
  color: var(--blue);
  font-size: clamp(18px, 3.2vw, 26px);
  margin-top: 16px;
}

/* ── DIVIDER ── */
.divider {
  width: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--blue), transparent);
  margin: 24px auto;
  transition: width 1.2s ease;
}

.divider.expand { width: 120px; }

/* ── SUPER FINAL ── */
.super-final {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90%;
  text-align: center;
  opacity: 0;
  transition: opacity 1.5s ease;
}

.super-final.visible { opacity: 1; }

.super-word {
  display: inline-block;
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(30px, 7vw, 64px);
  font-weight: 300;
  font-style: italic;
  letter-spacing: 0.04em;
  color: var(--text);
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 1s cubic-bezier(0.22, 1, 0.36, 1), transform 1s cubic-bezier(0.22, 1, 0.36, 1);
  margin: 0 6px;
}

.super-word.glow {
  color: var(--blue);
  text-shadow: 0 0 40px var(--blue-glow), 0 0 80px rgba(74,144,217,0.15);
}

.super-word.show {
  opacity: 1;
  transform: translateY(0);
}

/* ── FLOATING BG TEXT ── */
.bg-floaters {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  opacity: 0;
  transition: opacity 2s ease;
}

.bg-floaters.visible { opacity: 1; }

.floater {
  position: absolute;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(14px, 2vw, 20px);
  color: var(--blue);
  opacity: 0;
  white-space: nowrap;
  animation: float-up var(--dur, 14s) linear infinite var(--delay, 0s);
  letter-spacing: 0.05em;
}

@keyframes float-up {
  0%   { transform: translateY(110vh) rotate(var(--rot, -2deg)); opacity: 0; }
  10%  { opacity: var(--op, 0.12); }
  90%  { opacity: var(--op, 0.08); }
  100% { transform: translateY(-20vh) rotate(var(--rot, 2deg)); opacity: 0; }
}

/* ── PARTICLES ── */
.particle {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  animation: particle-rise var(--dur, 6s) ease-out forwards;
  opacity: 0;
}

@keyframes particle-rise {
  0%   { opacity: 0; transform: translate(0,0) scale(0.5); }
  20%  { opacity: 0.6; }
  100% { opacity: 0; transform: translate(var(--tx,0), -120px) scale(0.2); }
}

.signature {
  position: fixed;
  bottom: 18px;
  right: 24px;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 13px;
  color: rgba(232,238,248,0.38);
  letter-spacing: 0.06em;
  z-index: 10;
  pointer-events: none;
}
/* ── START EYEBROW & ORNAMENT ── */
.start-eyebrow {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px; font-weight: 200;
  letter-spacing: 0.5em; text-transform: uppercase;
  color: #c9a96e; opacity: 0.75;
  animation: fadeUp 1.2s ease both;
}
.start-ornament {
  display: flex; align-items: center; gap: 14px;
  animation: fadeUp 1.2s 0.3s ease both;
}
.so-line { width: 44px; height: 1px; background: linear-gradient(90deg, transparent, #c9a96e); opacity: 0.4; }
.so-line.r { background: linear-gradient(90deg, #c9a96e, transparent); }
.so-diamond { width: 4px; height: 4px; background: #c9a96e; opacity: 0.55; transform: rotate(45deg); }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.restart-btn {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 28px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  background: transparent;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 2px;
  cursor: pointer;
  display: none;
  transition: all 0.4s ease;
  z-index: 100;
}

.restart-btn:hover {
  color: var(--text);
  border-color: rgba(255,255,255,0.3);
}

/* ── SIGNATURE ── */
.signature {
  position: fixed;
  bottom: 20px;
  right: 28px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  font-style: italic;
  color: var(--muted);
  opacity: 0.5;
  letter-spacing: 0.05em;
  z-index: 10;
}
</style>
</head>
<body>

<!-- BACKGROUND LAYERS -->
<div class="scene"></div>
<div class="stars" id="stars"></div>
<div class="aurora" id="aurora"></div>

<!-- NEBULA PARTICLES -->
<div id="nebula"></div>

<!-- FLOATING BG TEXT -->
<div class="bg-floaters" id="bgFloaters"></div>

<!-- START SCREEN -->
<div class="start-screen" id="startScreen">
  <div class="start-eyebrow">Sana özel bir şey hazırladım</div>
  <div class="start-title">Sana bir şeyler<br>söylemek istiyorum,<br><em>Aynur...</em></div>
  <div class="start-ornament">
    <div class="so-line"></div>
    <div class="so-diamond"></div>
    <div class="so-line r"></div>
  </div>
  <button class="start-btn" onclick="startExperience()">Başlat</button>
</div>

<!-- MAIN CONTENT -->
<div class="container">

  <div class="content" id="content">
    <div class="prefix-wrap">
      <span class="prefix" id="prefix"></span>
    </div>
    <div class="main-text">
      <span id="text"></span><span class="cursor" id="cursor"></span>
    </div>
    <div class="counter" id="counter"></div>
  </div>

  <div class="final-text" id="finalText">
    <div class="divider" id="divider"></div>
  </div>

  <div class="super-final" id="superFinal"></div>

</div>

<button class="restart-btn" id="restartBtn" onclick="location.reload()">↺ &nbsp;Yeniden izle</button>
<div class="signature">Alperen Toprak</div>

<audio id="music" src="anilari-sakla.mp3" loop></audio>

<script>
/* ─── DATA ─── */
const sentences = [
  { prefix:"SEN",   text:"hayatıma geldiğinden beri her şey daha anlamlı oldu." },
  { prefix:"SENİ",  text:"sevmek bana hep iyi geliyor." },
  { prefix:"HAYATIMDA", text:"olduğun için çok şanslı hissediyorum." },
  { prefix:"SEN",   text:"kalbimdeki en güzel duyguların sahibisin." },
  { prefix:"BUGÜN", text:"senin doğum günün ve sen benim için çok özelsin." }
];

const finalLines = [
  "Hayatının geri kalanında tüm kötülükler senden uzak olsun.",
  "Mutluluklar adımlarının olduğu her yerde seni bulsun.",
  "Yeni yaşın sana huzur, sağlık ve neşe getirsin.",
  "Unutma, ben her zaman senin yanındayım...",
];
const finalSpecial = "İyi ki varsın sevgilim 💙";

const superWords = ["💙", "SENİ", "ÇOK", "SEVİYORUM", "💙"];
const superGlow  = [false, true, false, true, false];

const bgPhrases = ["Seni Seviyorum","İyi ki","Aşkım","Aynur","Hayatım","Her Şeyim","Bebeğim","Canım","Kalbim","🥺","💕","😍","Güzelim"];

/* ─── STATE ─── */
let currentSentence = 0;
let currentChar = 0;
let isDeleting = false;

/* ─── STARS ─── */
(function buildStars(){
  const container = document.getElementById('stars');
  for(let i = 0; i < 180; i++){
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 0.5;
    const minOp = (Math.random() * 0.2 + 0.1).toFixed(2);
    const maxOp = (Math.random() * 0.5 + 0.4).toFixed(2);
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%; left:${Math.random()*100}%;
      --d:${(Math.random()*5+2).toFixed(1)}s;
      --delay:-${(Math.random()*8).toFixed(1)}s;
      --min-op:${minOp}; --max-op:${maxOp};
    `;
    container.appendChild(s);
  }
})();

/* ─── AURORA ─── */
(function buildAurora(){
  const container = document.getElementById('aurora');
  const positions = [25, 35, 42, 55, 63, 72];
  positions.forEach((pos, i) => {
    const band = document.createElement('div');
    band.className = 'aurora-band';
    band.style.cssText = `
      --start:${pos}%; --dur:${12+i*3}s; --delay:-${i*2.5}s;
      opacity: ${0.08 + i*0.03};
    `;
    container.appendChild(band);
  });
})();

/* ─── NEBULA ─── */
(function buildNebula(){
  const container = document.getElementById('nebula');
  const blobs = [
    {x:15,y:30, size:300, color:'#1a3a8a', op:0.12, dur:22, delay:0},
    {x:75,y:60, size:400, color:'#0d2a6a', op:0.1,  dur:28, delay:-8},
    {x:50,y:80, size:250, color:'#122050', op:0.08, dur:18, delay:-5},
    {x:85,y:20, size:200, color:'#1e4a9a', op:0.07, dur:25, delay:-12},
  ];
  blobs.forEach(b => {
    const el = document.createElement('div');
    el.className = 'nebula-particle';
    el.style.cssText = `
      left:${b.x}%; top:${b.y}%; width:${b.size}px; height:${b.size}px;
      background:${b.color}; --op:${b.op}; --dur:${b.dur}s; --delay:${b.delay}s;
      --tx:${(Math.random()*40-20).toFixed(0)}px; --ty:${(Math.random()*40-20).toFixed(0)}px;
    `;
    container.appendChild(el);
  });
})();

/* ─── COUNTER DOTS ─── */
function buildCounter(){
  const c = document.getElementById('counter');
  sentences.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.id = `dot-${i}`;
    c.appendChild(d);
  });
}

function updateDot(idx){
  document.querySelectorAll('.dot').forEach((d,i) => {
    d.classList.toggle('active', i === idx);
  });
}

/* ─── START ─── */
function startExperience(){
  document.getElementById('startScreen').classList.add('hidden');
  buildCounter();
  setTimeout(() => {
    document.getElementById('content').classList.add('visible');
  }, 800);

  document.getElementById('music').play().catch(() => {});
  type();
}

/* ─── TYPEWRITER ─── */
function type(){
  const current = sentences[currentSentence];
  if(!current) return;

  document.getElementById('prefix').textContent = current.prefix;
  updateDot(currentSentence);

  if(isDeleting){
    document.getElementById('text').textContent = current.text.substring(0, currentChar--);
  } else {
    document.getElementById('text').textContent = current.text.substring(0, currentChar++);
  }

  if(!isDeleting && currentChar === current.text.length + 1){
    setTimeout(() => { isDeleting = true; }, 1800);
  } else if(isDeleting && currentChar === 0){
    isDeleting = false;
    currentSentence++;
    if(currentSentence === sentences.length){
      startFinal();
      return;
    }
  }

  setTimeout(type, isDeleting ? 35 : 65);
}

/* ─── FINAL PHASE ─── */
function startFinal(){
  const content = document.getElementById('content');
  content.style.opacity = '0';
  content.style.transition = 'opacity 1s ease';

  setTimeout(() => {
    const finalEl = document.getElementById('finalText');
    finalEl.classList.add('visible');

    // build lines
    finalLines.forEach((line, i) => {
      const div = document.createElement('div');
      div.className = 'final-line';
      div.textContent = line;
      finalEl.appendChild(div);
    });

    // special last line
    const last = document.createElement('div');
    last.className = 'final-line last';
    last.textContent = finalSpecial;
    finalEl.appendChild(last);

    // expand divider
    setTimeout(() => document.getElementById('divider').classList.add('expand'), 200);

    // reveal lines one by one
    const allLines = finalEl.querySelectorAll('.final-line');
    allLines.forEach((line, i) => {
      setTimeout(() => line.classList.add('show'), 400 + i * 900);
    });

    const totalTime = 400 + allLines.length * 900 + 1800;
    setTimeout(showSuperFinal, totalTime);

  }, 1200);
}

/* ─── SUPER FINAL ─── */
function showSuperFinal(){
  const finalEl = document.getElementById('finalText');
  finalEl.style.opacity = '0';
  finalEl.style.transition = 'opacity 1.2s ease';

  setTimeout(() => {
    const superEl = document.getElementById('superFinal');
    superEl.classList.add('visible');

    superWords.forEach((word, i) => {
      const span = document.createElement('span');
      span.className = 'super-word' + (superGlow[i] ? ' glow' : '');
      span.textContent = word;
      superEl.appendChild(span);
      setTimeout(() => span.classList.add('show'), i * 500);
    });

    // Start atmosphere
    setTimeout(() => {
      startFloatingBg();
      startSparkles();
      document.getElementById('restartBtn').style.display = 'block';
    }, superWords.length * 500 + 600);

  }, 1200);
}

/* ─── FLOATING BG TEXT ─── */
function startFloatingBg(){
  const container = document.getElementById('bgFloaters');
  container.classList.add('visible');

  for(let i = 0; i < 20; i++){
    setTimeout(() => {
      const span = document.createElement('span');
      span.className = 'floater';
      span.textContent = bgPhrases[Math.floor(Math.random() * bgPhrases.length)];
      const rot = (Math.random() * 10 - 5).toFixed(1);
      const op  = (Math.random() * 0.1 + 0.06).toFixed(2);
      span.style.cssText = `
        left: ${Math.random() * 90}%;
        --dur: ${12 + Math.random() * 12}s;
        --delay: -${Math.random() * 8}s;
        --rot: ${rot}deg;
        --op: ${op};
      `;
      container.appendChild(span);
    }, i * 400);
  }
}

/* ─── SPARKLES ─── */
function startSparkles(){
  setInterval(() => {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 4 + 2;
    const hue  = Math.random() > 0.5 ? '210' : '220';
    const tx   = (Math.random() * 60 - 30).toFixed(0);
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random() * 100}vw; top:${60 + Math.random() * 35}vh;
      background: hsl(${hue}, 80%, 70%);
      --dur: ${4 + Math.random() * 4}s;
      --tx: ${tx}px;
      box-shadow: 0 0 6px hsl(${hue}, 80%, 70%);
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 8000);
  }, 500);
}
</script>
</body>
